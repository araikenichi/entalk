name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Print env
        run: |
          node -v
          npm -v
          npm config get registry

      # ci が失敗したら install にフォールバック（peer 衝突は legacy-peer-deps で回避）
      - name: Install deps (ci -> install fallback)
        run: |
          npm ci || npm install --legacy-peer-deps

      - name: Build
        env:
          NODE_ENV: production
        run: npm run build --if-present

      - name: Add 404 fallback (SPA)
        run: cp dist/index.html dist/404.html || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

